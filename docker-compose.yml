services:
    via-bot:
        build: .
        container_name: Via-bot
        restart: unless-stopped
        env_file:
            - ./qq.env
        volumes:
            - ./:/app
        command: python via.py

    support_bot:
        build: .
        container_name: Support-bot
        restart: unless-stopped
        env_file:
            - ./qq.env
        volumes:
            - ./:/app
        command: python support.py
